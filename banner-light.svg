<svg width="1280"
height="320"
viewBox="0 0 1280 320"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop offset="0%" stop-color="#F8FAFC"/>
<stop offset="100%" stop-color="#E2E8F0"/>

</linearGradient>

<linearGradient id="glass">

<stop offset="0%"
stop-color="#FFFFFF"
stop-opacity="0.85"/>

<stop offset="100%"
stop-color="#FFFFFF"
stop-opacity="0.45"/>

</linearGradient>

<linearGradient id="title">

<stop offset="0%"
stop-color="#7C3AED"/>

<stop offset="100%"
stop-color="#0891B2"/>

</linearGradient>

<filter id="shadow">

<feDropShadow
dx="0"
dy="20"
stdDeviation="25"
flood-opacity="0.15"/>

</filter>

<filter id="blur">
<feGaussianBlur stdDeviation="60"/>
</filter>

</defs>

<!-- Background -->

<rect
width="100%"
height="100%"
rx="45"
fill="url(#bg)"/>

<!-- Glow Effects -->

<circle
cx="180"
cy="70"
r="180"
fill="#A78BFA"
opacity="0.25"
filter="url(#blur)"/>

<circle
cx="1120"
cy="260"
r="200"
fill="#67E8F9"
opacity="0.25"
filter="url(#blur)"/>

<!-- Main Glass Card -->

<g>

<animateTransform
attributeName="transform"
type="translate"
values="0 0;0 -5;0 0"
dur="7s"
repeatCount="indefinite"/>

<rect
x="120"
y="50"
width="1040"
height="220"
rx="50"
fill="url(#glass)"
stroke="#ffffff"
filter="url(#shadow)"/>

<!-- Reflection -->

<rect
x="160"
y="70"
width="960"
height="35"
rx="18"
fill="#ffffff90"/>

<!-- Developer Label -->

<rect
x="460"
y="95"
width="360"
height="40"
rx="20"
fill="#ffffff70"/>

<text
x="640"
y="122"
text-anchor="middle"
font-size="18"
font-weight="700"
font-family="Arial"
fill="#475569">

FULL STACK PYTHON DEVELOPER

</text>

<!-- Name -->

<text
x="640"
y="175"
text-anchor="middle"
font-size="42"
font-weight="700"
font-family="Arial"
fill="url(#title)">

SHERLA HARSHAVARDHAN

</text>

<!-- Role -->

<text
x="640"
y="215"
text-anchor="middle"
font-size="22"
font-family="Arial"
fill="#475569">

Building Modern Web Applications with Python & React

</text>

<!-- Tagline -->

<text
x="640"
y="245"
text-anchor="middle"
font-size="17"
font-family="Arial"
fill="#64748B">

Turning coffee into clean Python code and interactive React components.

</text>

</g>

<!-- Floating Skill Pills -->

<g>

<animateTransform
attributeName="transform"
type="translate"
values="0 0;0 -8;0 0"
dur="5s"
repeatCount="indefinite"/>

<rect
x="120"
y="120"
width="130"
height="48"
rx="24"
fill="#3776AB22"/>

<text
x="185"
y="150"
text-anchor="middle"
font-size="18"
font-weight="700"
fill="#3776AB">

Python

</text>

</g>

<g>

<animateTransform
attributeName="transform"
type="translate"
values="0 0;0 -10;0 0"
dur="6s"
repeatCount="indefinite"/>

<rect
x="1030"
y="120"
width="130"
height="48"
rx="24"
fill="#61DAFB22"/>

<text
x="1095"
y="150"
text-anchor="middle"
font-size="18"
font-weight="700"
fill="#0891B2">

React

</text>

</g>

<g>

<rect
x="150"
y="210"
width="110"
height="42"
rx="20"
fill="#F59E0B22"/>

<text
x="205"
y="237"
text-anchor="middle"
font-size="16"
font-weight="700"
fill="#D97706">

Web Dev

</text>

</g>

<g>

<rect
x="1020"
y="210"
width="110"
height="42"
rx="20"
fill="#8B5CF622"/>

<text
x="1075"
y="237"
text-anchor="middle"
font-size="16"
font-weight="700"
fill="#7C3AED">

UI/UX

</text>

</g>

</svg>
