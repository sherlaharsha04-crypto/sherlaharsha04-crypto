<svg width="1280"
     height="320"
     viewBox="0 0 1280 320"
     xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bg"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>

    <linearGradient id="title"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="1280"
        height="320"
        rx="40"
        fill="url(#bg)"/>

  <!-- Decorative Blobs -->
  <circle cx="180"
          cy="70"
          r="150"
          fill="#C4B5FD"
          opacity="0.45"/>

  <circle cx="1100"
          cy="250"
          r="180"
          fill="#A5F3FC"
          opacity="0.45"/>

  <!-- Main Glass Card -->
  <rect x="110"
        y="45"
        width="1060"
        height="230"
        rx="50"
        fill="#FFFFFF"
        fill-opacity="0.75"
        stroke="#FFFFFF"/>

  <!-- Reflection -->
  <rect x="150"
        y="65"
        width="980"
        height="35"
        rx="18"
        fill="#FFFFFF"
        fill-opacity="0.55"/>

  <!-- Developer Badge -->
  <rect x="450"
        y="95"
        width="380"
        height="42"
        rx="21"
        fill="#FFFFFF"/>

  <text x="640"
        y="122"
        text-anchor="middle"
        font-size="18"
        font-family="Arial"
        font-weight="700"
        fill="#475569">

      FULL STACK PYTHON DEVELOPER

  </text>

  <!-- Name -->
  <text x="640"
        y="180"
        text-anchor="middle"
        font-size="44"
        font-family="Arial"
        font-weight="700"
        fill="url(#title)">

      SHERLA HARSHAVARDHAN

  </text>

  <!-- Role -->
  <text x="640"
        y="220"
        text-anchor="middle"
        font-size="22"
        font-family="Arial"
        fill="#475569">

      Python • React • Web Development

  </text>

  <!-- Tagline -->
  <text x="640"
        y="250"
        text-anchor="middle"
        font-size="17"
        font-family="Arial"
        fill="#64748B">

      Turning coffee into clean Python code and interactive React components.

  </text>

  <!-- Left Skill -->
  <rect x="160"
        y="120"
        width="140"
        height="48"
        rx="24"
        fill="#3776AB22"/>

  <text x="230"
        y="150"
        text-anchor="middle"
        font-size="18"
        font-weight="700"
        fill="#3776AB">

      Python

  </text>

  <!-- Right Skill -->
  <rect x="980"
        y="120"
        width="140"
        height="48"
        rx="24"
        fill="#61DAFB33"/>

  <text x="1050"
        y="150"
        text-anchor="middle"
        font-size="18"
        font-weight="700"
        fill="#0891B2">

      React

  </text>

  <!-- Bottom Left -->
  <rect x="190"
        y="210"
        width="120"
        height="42"
        rx="21"
        fill="#F59E0B22"/>

  <text x="250"
        y="237"
        text-anchor="middle"
        font-size="16"
        font-weight="700"
        fill="#D97706">

      Web Dev

  </text>

  <!-- Bottom Right -->
  <rect x="970"
        y="210"
        width="120"
        height="42"
        rx="21"
        fill="#8B5CF622"/>

  <text x="1030"
        y="237"
        text-anchor="middle"
        font-size="16"
        font-weight="700"
        fill="#7C3AED">

      UI/UX

  </text>

</svg>
