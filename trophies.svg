<svg width="1000"
     height="340"
     viewBox="0 0 1000 340"
     xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bg"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <linearGradient id="glass"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="100%">
      <stop offset="0%"
            stop-color="#ffffff"
            stop-opacity="0.22"/>

      <stop offset="100%"
            stop-color="#ffffff"
            stop-opacity="0.05"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0"
                    dy="18"
                    stdDeviation="18"
                    flood-opacity="0.35"/>
    </filter>

  </defs>

  <!-- Background -->

  <rect width="100%"
        height="100%"
        rx="40"
        fill="url(#bg)"/>

  <!-- Glow Effects -->

  <circle cx="120"
          cy="70"
          r="150"
          fill="#8b5cf6"
          opacity="0.10"/>

  <circle cx="880"
          cy="280"
          r="180"
          fill="#06b6d4"
          opacity="0.08"/>

  <!-- Title -->

  <text x="50"
        y="60"
        fill="white"
        font-size="34"
        font-family="Segoe UI"
        font-weight="700">

      Developer Skills

  </text>

  <!-- Card 1 -->

  <g>

    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0;0 -8;0 0"
      dur="5s"
      repeatCount="indefinite"/>

    <rect x="50"
          y="110"
          width="270"
          height="180"
          rx="35"
          fill="url(#glass)"
          stroke="#ffffff22"
          filter="url(#shadow)"/>

    <text x="185"
          y="170"
          text-anchor="middle"
          font-size="46"
          fill="#facc15"
          font-weight="bold">

        PY

    </text>

    <text x="185"
          y="220"
          text-anchor="middle"
          fill="white"
          font-size="22"
          font-weight="600">

        Full Stack Python

    </text>

    <text x="185"
          y="250"
          text-anchor="middle"
          fill="#CBD5E1"
          font-size="15">

        Django • APIs • SQL

    </text>

  </g>

  <!-- Card 2 -->

  <g>

    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0;0 -10;0 0"
      dur="6s"
      repeatCount="indefinite"/>

    <rect x="365"
          y="110"
          width="270"
          height="180"
          rx="35"
          fill="url(#glass)"
          stroke="#ffffff22"
          filter="url(#shadow)"/>

    <text x="500"
          y="170"
          text-anchor="middle"
          font-size="46"
          fill="#8b5cf6"
          font-weight="bold">

        WEB

    </text>

    <text x="500"
          y="220"
          text-anchor="middle"
          fill="white"
          font-size="22"
          font-weight="600">

        Web Development

    </text>

    <text x="500"
          y="250"
          text-anchor="middle"
          fill="#CBD5E1"
          font-size="15">

        HTML • CSS • JavaScript

    </text>

  </g>

  <!-- Card 3 -->

  <g>

    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0;0 -12;0 0"
      dur="7s"
      repeatCount="indefinite"/>

    <rect x="680"
          y="110"
          width="270"
          height="180"
          rx="35"
          fill="url(#glass)"
          stroke="#ffffff22"
          filter="url(#shadow)"/>

    <text x="815"
          y="170"
          text-anchor="middle"
          font-size="46"
          fill="#06b6d4"
          font-weight="bold">

        UI

    </text>

    <text x="815"
          y="220"
          text-anchor="middle"
          fill="white"
          font-size="22"
          font-weight="600">

        UI Development

    </text>

    <text x="815"
          y="250"
          text-anchor="middle"
          fill="#CBD5E1"
          font-size="15">

        React • Responsive Design

    </text>

  </g>

</svg>
