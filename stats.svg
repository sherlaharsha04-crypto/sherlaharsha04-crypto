<svg width="1000"
height="420"
viewBox="0 0 1000 420"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop offset="0%" stop-color="#030712"/>
<stop offset="100%" stop-color="#111827"/>

</linearGradient>

<linearGradient id="glass">

<stop offset="0%"
stop-color="#ffffff"
stop-opacity="0.18"/>

<stop offset="100%"
